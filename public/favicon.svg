<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0618"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c8a8f0"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="20" cy="22" r="1.2" fill="#e2d4f7" opacity="0.8"/>
  <circle cx="75" cy="18" r="0.9" fill="#e2d4f7" opacity="0.6"/>
  <circle cx="82" cy="68" r="1.1" fill="#e2d4f7" opacity="0.7"/>
  <circle cx="15" cy="70" r="0.8" fill="#e2d4f7" opacity="0.5"/>
  <circle cx="68" cy="82" r="1.0" fill="#e2d4f7" opacity="0.6"/>
  <circle cx="30" cy="80" r="0.7" fill="#e2d4f7" opacity="0.5"/>
  <circle cx="88" cy="38" r="0.9" fill="#e2d4f7" opacity="0.7"/>
  <!-- Crescent moon: full circle minus offset circle to create crescent -->
  <circle cx="46" cy="50" r="26" fill="url(#moonGlow)"/>
  <circle cx="56" cy="45" r="22" fill="url(#bg)"/>
  <!-- Subtle glow ring -->
  <circle cx="46" cy="50" r="26" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
</svg>
